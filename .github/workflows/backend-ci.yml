name: backend-ci

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore HealthManager.sln

      - name: Build
        run: dotnet build HealthManager.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test HealthManager.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Generate coverage report
        run: dotnet tool run reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"CoverageReport" -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"

      - name: Publish coverage summary
        if: always()
        run: cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            TestResults/**
            CoverageReport/**
