name: backend-ci

on:
  push:
    branches: ["master", "main", "develop"]
  pull_request:

env:
  AWS_REGION: us-east-2
  ECR_API_REPO: healthmanager-api
  ECS_CLUSTER: healthmanager-cluster
  ECS_API_SERVICE: healthmanager-api
  LAMBDA_OUTBOX_FUNCTION: healthmanager-outbox

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore HealthManager.sln

      - name: Build
        run: dotnet build HealthManager.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test HealthManager.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Generate coverage report
        run: dotnet tool run reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"CoverageReport" -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"

      - name: Publish coverage summary
        if: always()
        run: cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            TestResults/**
            CoverageReport/**

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build -f Dockerfile.api -t $REGISTRY/$ECR_API_REPO:$TAG -t $REGISTRY/$ECR_API_REPO:latest .
          docker push $REGISTRY/$ECR_API_REPO:$TAG
          docker push $REGISTRY/$ECR_API_REPO:latest

      - name: Publish Lambda
        run: |
          dotnet publish src/HealthManager.Lambda/HealthManager.Lambda.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output /tmp/lambda-publish
          cd /tmp/lambda-publish && zip -r /tmp/outbox-lambda.zip .

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_OUTBOX_FUNCTION \
            --zip-file fileb:///tmp/outbox-lambda.zip \
            --architectures x86_64

      - name: Deploy API to ECS
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition healthmanager-api --query taskDefinition)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$REGISTRY/$ECR_API_REPO:$TAG" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_API_SERVICE --task-definition $NEW_TASK_ARN --force-new-deployment

      - name: Wait for API deployment
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_API_SERVICE
